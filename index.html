<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Sandbox Site</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <p class="eyebrow">Student Works</p>
  <h1 class="site-title">ポートフォリオ一覧</h1>
  <p class="site-sub">バイブコーディングで制作したアプリの一覧。サムネイルをクリックして開いてください。</p>
</header>

<main>
  <div id="grid" class="grid" aria-live="polite"></div>
  <p id="empty-state" class="empty-state" hidden>
    まだ登録された作品がありません。<code>data/manifest.json</code> を確認してください。
  </p>
  <p id="error-state" class="empty-state" hidden>
    作品データの読み込みに失敗しました。<code>data/manifest.json</code> が存在するか確認してください。
  </p>
</main>

<footer class="site-footer">
  <p></p>
</footer>

<script src="script.js"></script>
</body>
</html>
